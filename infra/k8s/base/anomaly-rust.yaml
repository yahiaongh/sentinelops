apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-rust
  namespace: sentinelops
spec:
  replicas: 1
  selector:
    matchLabels: { app: anomaly-rust }
  template:
    metadata:
      labels: { app: anomaly-rust }
    spec:
      containers:
        - name: anomaly-rust
          image: sentinelops/anomaly-rust:local
          imagePullPolicy: Never
          ports:
            - containerPort: 9200
          envFrom:
            - secretRef:
                name: sentinelops-secrets
          env:
            - name: POLL_INTERVAL_SECS
              value: "15"
            - name: BASELINE_WINDOW_MINUTES
              value: "60"
            - name: Z_SCORE_WARNING
              value: "2.5"
            - name: Z_SCORE_CRITICAL
              value: "4.0"
            - name: EWMA_ALPHA
              value: "0.3"
            - name: METRICS_ADDR
              value: "0.0.0.0:9200"
          readinessProbe:
            httpGet: { path: /metrics, port: 9200 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-rust
  namespace: sentinelops
spec:
  selector: { app: anomaly-rust }
  ports:
    - port: 9200
      targetPort: 9200