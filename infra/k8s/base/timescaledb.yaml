apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-data
  namespace: sentinelops
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: sentinelops
spec:
  replicas: 1
  selector:
    matchLabels: { app: timescaledb }
  template:
    metadata:
      labels: { app: timescaledb }
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:2.15.3-pg16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: sentinelops-secrets
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "sentinelops"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "sentinelops"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: timescaledb-data
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: sentinelops
spec:
  selector: { app: timescaledb }
  ports:
    - port: 5432
      targetPort: 5432