name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-go:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"
          cache-dependency-path: services/ingestion-go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: services/ingestion-go
          args: --timeout=5m

  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    needs: lint-go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"
          cache-dependency-path: services/ingestion-go/go.sum

      - name: Run tests
        working-directory: services/ingestion-go
        run: go test ./... -v -race -cover

      - name: Build binary
        working-directory: services/ingestion-go
        run: CGO_ENABLED=0 go build -o /tmp/ingestor ./cmd/ingestor

  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: Run ruff check
        working-directory: services/log-producer
        run: ruff check .

      - name: Run ruff format check
        working-directory: services/log-producer
        run: ruff format --check .

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test-go, lint-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ingestion-go image
        uses: docker/build-push-action@v6
        with:
          context: services/ingestion-go
          push: false
          tags: sentinelops/ingestion-go:ci

      - name: Build log-producer image
        uses: docker/build-push-action@v6
        with:
          context: services/log-producer
          push: false
          tags: sentinelops/log-producer:ci

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint-go, test-go, lint-python, docker-build]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"